name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-apk:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build web app for Android
        run: npm run build-android
        env:
          PLATFORM: android

      - name: Sync Capacitor
        run: |
          echo "=== Syncing Capacitor ==="
          echo "Android folder exists: $(test -d android && echo 'yes' || echo 'no')"
          npx cap sync android
          echo "=== Sync complete ==="

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Building Debug APK ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          java -version
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo ""
          echo "Build complete. Checking APK..."
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"
        continue-on-error: false

      - name: Build release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        continue-on-error: false

      - name: Find APK files
        run: |
          echo "=== Finding APK files ==="
          find android -name "*.apk" -type f 2>/dev/null
          echo "=== APK file details ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK dir not found"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK dir not found"

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Uploading Debug APK ==="
          APK_PATH=$(find android -name "*.apk" -path "*/debug/*" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "Size: $(du -h "$APK_PATH" | cut -f1)"
            
            # Upload using curl with GitHub API
            # First, get the upload URL
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
              -d '{"name":"app-debug-apk","size":'"$(stat -f%z "$APK_PATH")"',"content_type":"application/vnd.android.package-archive"}')
            
            echo "Response: $RESPONSE"
            
            # Extract upload URL and artifact ID
            UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,archive_format}//')
            ARTIFACT_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
            
            echo "Upload URL: $UPLOAD_URL"
            echo "Artifact ID: $ARTIFACT_ID"
            
            if [ -n "$UPLOAD_URL" ]; then
              # Upload the file
              curl -s -X PUT \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary "@$APK_PATH" \
                "$UPLOAD_URL"
              
              echo "=== APK Uploaded Successfully ==="
            else
              echo "ERROR: Could not get upload URL"
              exit 1
            fi
          else
            echo "ERROR: No debug APK found"
            exit 1
          fi

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Uploading Release APK ==="
          APK_PATH=$(find android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "Size: $(du -h "$APK_PATH" | cut -f1)"
            
            # Upload using curl with GitHub API
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/json" \
              https://api.github.com/repos/${{ github.repository }}/actions/artifacts \
              -d '{"name":"app-release-apk","size":'"$(stat -f%z "$APK_PATH")"',"content_type":"application/vnd.android.package-archive"}')
            
            UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,archive_format}//')
            
            if [ -n "$UPLOAD_URL" ]; then
              curl -s -X PUT \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/vnd.android.package-archive" \
                --data-binary "@$APK_PATH" \
                "$UPLOAD_URL"
              
              echo "=== APK Uploaded Successfully ==="
            else
              echo "ERROR: Could not get upload URL"
              exit 1
            fi
          else
            echo "ERROR: No release APK found"
            exit 1
          fi