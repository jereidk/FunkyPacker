name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-apk:
    runs-on: macos-latest
    
    env:
      JAVA_HOME: /Library/Java/JavaVirtualMachines/zulu-21.jdk/Contents/Home
      # Opt into Node.js 24 to avoid deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          # Use sdkmanager to install required SDK components
          if [ -d "$ANDROID_HOME/cmdline-tools/latest/bin" ]; then
            sdkmanager --install "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true
          fi
          echo "Installed platforms:"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"

      - name: Build web app for Android
        run: npm run build-android
        env:
          PLATFORM: android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Verify environment
        run: |
          echo "=== Environment ==="
          echo "JAVA_HOME: $JAVA_HOME"
          echo "java -version:"
          java -version 2>&1 || echo "Java not found"
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "=== Android SDK ==="
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms"
          echo "=== Project structure ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs yet"

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          echo ""
          echo "=== Build Log (last 100 lines) ==="
          tail -100 build.log
        continue-on-error: true

      - name: Build release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          cd android
          ./gradlew clean assembleRelease --no-daemon 2>&1 | tee build.log
        continue-on-error: true

      - name: Check APK output
        run: |
          echo "=== APK Files ==="
          find android -name "*.apk" -type f 2>/dev/null
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release APK"

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30