name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-apk:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Build web app for Android
        run: npm run build-android
        env:
          PLATFORM: android

      - name: Sync Capacitor
        run: |
          echo "=== Syncing Capacitor ==="
          echo "Android folder exists: $(test -d android && echo 'yes' || echo 'no')"
          npx cap sync android
          echo "=== Sync complete ==="

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Building Debug APK ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          java -version
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo ""
          echo "Build complete. Checking APK..."
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"
        continue-on-error: false

      - name: Build release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        continue-on-error: false

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Creating Release for Debug APK ==="
          
          # Create a tag if it doesn't exist
          TAG="debug-$(date +%Y%m%d-%H%M%S)"
          echo "Tag: $TAG"
          
          # Create release via GitHub API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d '{
              "tag_name":"'"$TAG"'",
              "name":"Debug APK Build '"$TAG"'",
              "draft":true,
              "prerelease":true,
              "body":"Debug APK built from branch '"${{ github.ref_name }}"' at '"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }')
          
          echo "Release response: $RESPONSE"
          
          # Extract upload URL
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,archive_format}//')
          RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          
          echo "Upload URL: $UPLOAD_URL"
          echo "Release ID: $RELEASE_ID"
          
          if [ -n "$UPLOAD_URL" ]; then
            # Upload APK
            echo "=== Uploading APK ==="
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
            
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary "@$APK_PATH" \
              "${UPLOAD_URL}?name=app-debug.apk"
            
            echo "=== APK Uploaded to Release ==="
            
            # Save release info for download
            echo "$RELEASE_ID" > release_id.txt
            echo "$TAG" > release_tag.txt
          fi

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Creating Release for Release APK ==="
          
          TAG="release-$(date +%Y%m%d-%H%M%S)"
          echo "Tag: $TAG"
          
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/releases \
            -d '{
              "tag_name":"'"$TAG"'",
              "name":"Release APK Build '"$TAG"'",
              "draft":true,
              "body":"Release APK built from branch '"${{ github.ref_name }}"' at '"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"
            }')
          
          UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"upload_url":"[^"]*"' | cut -d'"' -f4 | sed 's/{?name,archive_format}//')
          RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2)
          
          if [ -n "$UPLOAD_URL" ]; then
            echo "=== Uploading APK ==="
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
            
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -H "Content-Type: application/vnd.android.package-archive" \
              --data-binary "@$APK_PATH" \
              "${UPLOAD_URL}?name=app-release.apk"
            
            echo "$RELEASE_ID" > release_id.txt
            echo "$TAG" > release_tag.txt
            echo "=== APK Uploaded to Release ==="
          fi

      - name: Comment on PR with download link
        if: github.event_name == 'pull_request'
        run: |
          if [ -f release_tag.txt ]; then
            TAG=$(cat release_tag.txt)
            COMMENT="## ✅ APK Build Complete
            
The APK has been uploaded to a draft release: https://github.com/${{ github.repository }}/releases/tag/$TAG
            
> Download the APK directly from the release assets!"
            
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              -d '{"body":"'"$COMMENT"'"}'
          fi