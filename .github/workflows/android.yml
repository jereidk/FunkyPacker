name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
          - both

jobs:
  build-apk:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Setup GitHub CLI
        run: |
          if ! command -v gh &> /dev/null; then
            echo "Installing GitHub CLI..."
            brew install gh
          fi
          gh auth status || gh auth login --with-token <<< '${{ secrets.GITHUB_TOKEN }}'

      - name: Build web app for Android
        run: npm run build-android
        env:
          PLATFORM: android

      - name: Sync Capacitor
        run: |
          echo "=== Syncing Capacitor ==="
          echo "Android folder exists: $(test -d android && echo 'yes' || echo 'no')"
          npx cap sync android
          echo "=== Sync complete ==="

      - name: Build debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Building Debug APK ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          java -version
          
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo ""
          echo "Build complete. Checking APK..."
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No APK found"
        continue-on-error: false

      - name: Build release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        continue-on-error: false

      - name: Find APK files
        run: |
          echo "=== Finding APK files ==="
          find android -name "*.apk" -type f 2>/dev/null
          echo "=== APK file details ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK dir not found"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "Release APK dir not found"

      - name: Upload debug APK
        if: github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Uploading Debug APK ==="
          APK_PATH=$(find android -name "*.apk" -path "*/debug/*" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "Size: $(du -h "$APK_PATH" | cut -f1)"
            
            # Upload using gh cli with correct endpoint
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -F name="app-debug-apk" \
              -F file="@$APK_PATH" \
              -F content_type="application/vnd.android.package-archive" \
              repos/${{ github.repository }}/actions/artifacts
            
            echo "=== APK Uploaded Successfully ==="
          else
            echo "ERROR: No debug APK found"
            exit 1
          fi

      - name: Upload release APK
        if: github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both'
        run: |
          echo "=== Uploading Release APK ==="
          APK_PATH=$(find android -name "*.apk" -path "*/release/*" -type f 2>/dev/null | head -1)
          if [ -n "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            echo "Size: $(du -h "$APK_PATH" | cut -f1)"
            
            # Upload using gh cli with correct endpoint
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -F name="app-release-apk" \
              -F file="@$APK_PATH" \
              -F content_type="application/vnd.android.package-archive" \
              repos/${{ github.repository }}/actions/artifacts
            
            echo "=== APK Uploaded Successfully ==="
          else
            echo "ERROR: No release APK found"
            exit 1
          fi